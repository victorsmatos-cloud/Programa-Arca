<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - ARCA</title>
    <link rel="stylesheet" href="style-cadastro.css">
</head>
<body>

    <header class="topo">
        <h1>ARCA</h1>
    </header>

    <main>
        <div class="caixa">
            <h2>Cadastro</h2>

            <form id="form-cadastro" novalidate>

                <h3 class="secao-titulo">Dados Pessoais</h3>

                <div class="campo">
                    <label for="nome">Nome Completo / Nome da Empresa</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="campo">
                    <label for="cpf">CPF / CNPJ</label>
                    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF ou CNPJ" required>
                </div>

                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie sua senha" required>
                </div>

                <div class="campo">
                    <label for="confirmar-senha">Confirmar Senha</label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Repita sua senha" required>
                </div>

                <h3 class="secao-titulo">Documentação</h3>

                <div class="campo">
                    <label for="rg">Carteira de Identidade (RG)</label>
                    <input type="file" id="rg" name="rg" accept=".pdf,.jpg,.jpeg,.png">
                </div>

                <div class="campo">
                    <label for="residencia">Comprovante de Residência</label>
                    <input type="file" id="residencia" name="residencia" accept=".pdf,.jpg,.jpeg,.png">
                </div>

                <div class="campo">
                    <label for="eleitor">Título de Eleitor</label>
                    <input type="file" id="eleitor" name="eleitor" accept=".pdf,.jpg,.jpeg,.png">
                </div>

                <button type="submit" class="btn-cadastrar">Cadastrar</button>
                
            </form>
        </div>
    </main>

    <script>
        document.getElementById('form-cadastro').addEventListener('submit', function(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const cpf = document.getElementById('cpf').value;
            const telefone = document.getElementById('telefone').value;
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;

            if (senha !== confirmarSenha) {
                alert("As senhas não coincidem. Tente novamente.");
                return;
            }

            const usuario = {
                nome: nome,
                email: email,
                cpf: cpf,
                telefone: telefone,
                senha: senha,
                foto: null
            };

            localStorage.setItem('usuarioARCA', JSON.stringify(usuario));
            alert("Cadastro realizado com sucesso!");
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
